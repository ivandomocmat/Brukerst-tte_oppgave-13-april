<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>To-Do App</title>
</head>
<body>

    <header>
        <h1>To-Do App</h1>
    </header>

    <main>
        <section>
            <h2>Add Task</h2>
            <!-- Prevent page reload and call addTask() -->
            <form onsubmit="event.preventDefault(); postNote();">
                <label for="taskInput">New Task:</label>
                <input type="text" id="taskInput" placeholder="Enter a task">
                <button type="submit">Add</button>
            </form>
        </section>

        <section>
            <h2>Your Tasks</h2>
            <!-- Give the ul the correct id for JS -->
            <ul id="taskList"></ul>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 To-Do App</p>
    </footer>

  
<script src="list.js"></script>
</body>
</html>
